name: CI

on:
  push:
    branches: [master, main, "feature/**", "release/**"]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install .[dev]
      - run: mypy pcap2kml_player

  security:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r pcap2kml_player/ -ll

  test:
    name: Test (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa libgl1-mesa-glx libglib2.0-0 \
            libxkbcommon0 libdbus-1-3
      - name: Install Python dependencies
        run: pip install .[dev]
      - name: Run tests
        run: >
          QT_QPA_PLATFORM=offscreen
          QT_OPENGL=software
          QTWEBENGINE_CHROMIUM_FLAGS="--disable-gpu --no-sandbox"
          pytest
          --cov=pcap2kml_player
          --cov-report=xml
          --cov-report=term-missing
          -m "not pcap_real and not benchmark"
          --timeout=120
      - name: Check coverage
        run: >
          coverage report --fail-under=80
          --omit="pcap2kml_player/main.py,pcap2kml_player/ui/*,pcap2kml_player/map_widget.py"
      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
